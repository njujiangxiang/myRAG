version: '3.8'

services:
  # PostgreSQL - Metadata storage
  postgres:
    image: postgres:16-alpine
    container_name: myrag-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ragdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Qdrant - Vector database
  qdrant:
    image: qdrant/qdrant:latest
    container_name: myrag-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334

  # NATS - Message queue
  nats:
    image: nats:latest
    container_name: myrag-nats
    restart: unless-stopped
    ports:
      - "4222:4222"
      - "8222:8222"
    command: ["-js"]
    volumes:
      - nats_data:/data

  # MinIO - Object storage
  minio:
    image: minio/minio:latest
    container_name: myrag-minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

  # Web UI
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: myrag-web
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - app

  # Backend API
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: myrag-app
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/ragdb?sslmode=disable
      QDRANT_URL: http://qdrant:6333
      QDRANT_API_KEY: ""
      NATS_URL: nats://nats:4222
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: documents
      MINIO_USE_SSL: "false"
      OPENAI_API_KEY: ${OPENAI_API_KEY:-ollama}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-http://host.docker.internal:11434/v1}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-qwen3-embedding}
      LLM_MODEL: ${LLM_MODEL:-qwen3:8b}
      JWT_SECRET: ${JWT_SECRET:-myrag-development-secret-change-in-production}
      SERVER_PORT: 8080
      SERVER_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      nats:
        condition: service_started
      minio:
        condition: service_started

volumes:
  postgres_data:
  qdrant_data:
  nats_data:
  minio_data:

networks:
  default:
    name: myrag-network
