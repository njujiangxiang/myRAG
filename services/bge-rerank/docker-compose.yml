version: '3.8'

services:
  bge-rerank:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8800:8800"
    environment:
      - BGE_MODEL=BAAI/bge-reranker-v2-m3
      - BGE_DEVICE=cpu
      - BGE_HOST=0.0.0.0
      - BGE_PORT=8800
    volumes:
      - bge-cache:/root/.cache
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8800/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s  # Give model time to load

volumes:
  bge-cache:
